name: Horizon AI News Summary

on:
  schedule:
    # GitHub scheduled workflows use UTC.
    # 22:30 UTC is 08:30 Australia/Melbourne during AEST.
    # Revisit this when strict local time matters during daylight saving time.
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  ainews-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra openbb || uv sync

      - name: Prepare AI news config
        run: cp data/config.github.ainews.json data/config.json

      - name: Run Horizon AI news briefing
        timeout-minutes: 50
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_AINEWS_URL: ${{ secrets.HORIZON_AINEWS_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "AI News Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
