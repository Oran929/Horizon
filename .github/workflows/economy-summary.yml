name: Horizon Economy Summary

on:
  schedule:
    # GitHub scheduled workflows use UTC.
    # 23:00 UTC is 09:00 Australia/Melbourne during AEST.
    # Revisit this when strict local time matters during daylight saving time.
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  economy-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra openbb || uv sync

      - name: Prepare economy config
        run: cp data/config.github.economy.json data/config.json

      - name: Run Horizon economy briefing
        timeout-minutes: 50
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_ECONOMY_URL: ${{ secrets.HORIZON_ECONOMY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Economy Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
